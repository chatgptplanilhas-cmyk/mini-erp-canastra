name: Backup Supabase

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar PostgreSQL 17 Client
        uses: tj-actions/install-postgresql@v3
        with:
          postgresql-version: 17

      - name: Verificar versão do pg_dump
        run: pg_dump --version

      - name: Criar pasta de backup
        run: mkdir -p backups

      - name: Gerar backup do banco
        run: |
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            -f "backups/backup_$(date +'%Y-%m-%d_%H-%M-%S').sql"

      - name: Manter apenas os últimos 30 backups
        run: |
          ls -1t backups/*.sql 2>/dev/null | tail -n +31 | xargs -r rm

      - name: Commit backup e limpeza
        run: |
          git config user.name "Backup Bot"
          git config user.email "backup@github.com"
          git add backups/
          git commit -m "Backup automático Supabase com limpeza" || echo "Nenhuma alteração para salvar"
          git push
