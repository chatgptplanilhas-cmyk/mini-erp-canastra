name: Backup Supabase

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Instalar PostgreSQL Client
        run: sudo apt-get install -y postgresql-client

      - name: Criar pasta de backup
        run: mkdir -p backups

      - name: Gerar backup do banco
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump "$SUPABASE_DB_URL" > backups/backup_$(date +'%Y%m%d_%H%M%S').sql

      - name: Commit backup
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add backups/
          git commit -m "Novo backup Supabase" || echo "Sem alterações"

      - name: Push backup
        run: git push
