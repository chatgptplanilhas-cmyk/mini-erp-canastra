name: Backup Supabase

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar PostgreSQL Client
        run: sudo apt-get install postgresql-client -y

      - name: Criar pasta de backup
        run: mkdir -p backups

      - name: Gerar backup do banco
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump "$SUPABASE_DB_URL" > backups/backup_$(date +%Y%m%d_%H%M%S).sql

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backups/
